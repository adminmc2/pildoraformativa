[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# Redirect home to píldora formativa
[[redirects]]
  from = "/"
  to = "/pildoras-formativas/3-1"
  status = 200

# Handle Next.js dynamic routes
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
